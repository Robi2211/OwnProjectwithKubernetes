<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notenrechner</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f4f6f8; color: #1f2937; }
    .container { max-width: 700px; margin: 40px auto; background: #ffffff; padding: 24px; border-radius: 10px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08); }
    h1 { margin-top: 0; font-size: 28px; }
    p { color: #4b5563; }
    .row { display: flex; gap: 8px; margin-bottom: 12px; }
    input { flex: 1; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 16px; }
    button { border: none; border-radius: 8px; padding: 10px 14px; font-size: 14px; cursor: pointer; background: #2563eb; color: white; }
    button.secondary { background: #6b7280; }
    ul { padding-left: 18px; }
    .result { margin-top: 16px; padding: 14px; border-radius: 8px; background: #eef2ff; font-weight: bold; }
    .hint { font-size: 13px; color: #6b7280; margin-top: 6px; }
    .link { margin-top: 16px; display: inline-block; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Kleiner Notenrechner</h1>
    <p>Trage mehrere Noten (1.0 bis 6.0) ein und berechne den Durchschnitt.</p>
    <div class="row">
      <input id="gradeInput" type="number" min="1" max="6" step="0.1" placeholder="Beispiel: 2.3" />
      <button id="addGradeBtn" type="button">Note hinzufügen</button>
    </div>
    <div class="row">
      <button id="calcBtn" type="button">Durchschnitt berechnen</button>
      <button id="resetBtn" type="button" class="secondary">Zurücksetzen</button>
    </div>
    <div class="hint">Nur Werte von 1.0 bis 6.0 sind erlaubt.</div>
    <h3>Aktuelle Noten</h3>
    <ul id="gradeList"></ul>
    <div id="result" class="result">Noch keine Berechnung durchgeführt.</div>
    <a class="link" href="/pods.html">Zur Load-Balancer-Visualisierung</a>
  </div>

  <script>
    const grades = [];
    const gradeInput = document.getElementById("gradeInput");
    const gradeList = document.getElementById("gradeList");
    const result = document.getElementById("result");

    function renderGrades() {
      gradeList.innerHTML = "";
      if (grades.length === 0) {
        const li = document.createElement("li");
        li.textContent = "Noch keine Noten eingetragen.";
        gradeList.appendChild(li);
        return;
      }
      grades.forEach((grade, idx) => {
        const li = document.createElement("li");
        li.textContent = `Note ${idx + 1}: ${grade.toFixed(1)}`;
        gradeList.appendChild(li);
      });
    }

    document.getElementById("addGradeBtn").addEventListener("click", () => {
      const value = Number(gradeInput.value);
      if (!Number.isFinite(value) || value < 1 || value > 6) {
        result.textContent = "Ungültige Eingabe. Bitte eine Note zwischen 1.0 und 6.0 eingeben.";
        return;
      }
      grades.push(value);
      gradeInput.value = "";
      result.textContent = "Note hinzugefügt.";
      renderGrades();
    });

    document.getElementById("calcBtn").addEventListener("click", () => {
      if (grades.length === 0) {
        result.textContent = "Bitte zuerst mindestens eine Note eintragen.";
        return;
      }
      const sum = grades.reduce((acc, grade) => acc + grade, 0);
      const average = sum / grades.length;
      result.textContent = `Durchschnitt: ${average.toFixed(2)} (aus ${grades.length} Noten)`;
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      grades.length = 0;
      gradeInput.value = "";
      result.textContent = "Zurückgesetzt. Noch keine Berechnung durchgeführt.";
      renderGrades();
    });

    renderGrades();
  </script>
</body>
</html>
